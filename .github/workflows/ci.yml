name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Type check
        run: npx tsc -noEmit -skipLibCheck

      - name: Build
        run: node esbuild.config.mjs production

      - name: Verify artifacts
        run: |
          test -f main.js
          ls -lh main.js manifest.json styles.css
